# SharkRank — CI Pipeline
# Conforme QAEngineer.md: lint + testes unitários + contrato ELO < 5 min
name: SharkRank CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # === BACKEND (Python) ===
  backend-lint:
    name: "🐍 Backend Lint"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: SharkRank/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install ruff mypy
      - run: ruff check app/ tests/
      - run: ruff format --check app/ tests/

  backend-tests:
    name: "🧪 Backend Tests + ELO Contract"
    runs-on: ubuntu-latest
    needs: backend-lint
    defaults:
      run:
        working-directory: SharkRank/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install pytest pytest-cov fastapi uvicorn pydantic httpx
      - name: "Run tests (including ELO contract: ≤5pts in ≥95%)"
        run: python -m pytest tests/ -v --tb=short --cov=app --cov-report=term-missing
      - name: "Fail if coverage < 80%"
        run: python -m pytest tests/ --cov=app --cov-fail-under=80

  # === MOBILE (React Native) ===
  mobile-typecheck:
    name: "📱 Mobile TypeScript Check"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: SharkRank/mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: SharkRank/mobile/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit

  mobile-lint:
    name: "📱 Mobile ESLint"
    runs-on: ubuntu-latest
    needs: mobile-typecheck
    defaults:
      run:
        working-directory: SharkRank/mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: SharkRank/mobile/package-lock.json
      - run: npm ci
      - run: npx expo lint || true  # Non-blocking no MVP

  # === SECURITY (DevSecOps — QAEngineer.md) ===
  security-scan:
    name: "🔒 Security Scan"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: "NPM Audit (Mobile)"
        working-directory: SharkRank/mobile
        run: |
          npm ci
          npm audit --audit-level=critical || true
      - name: "Python Safety Check (Backend)"
        working-directory: SharkRank/backend
        run: |
          pip install pip-audit
          pip install fastapi uvicorn pydantic sqlalchemy
          pip-audit || true

  # === GATE SUMMARY ===
  ci-gate:
    name: "✅ CI Gate"
    runs-on: ubuntu-latest
    needs: [backend-tests, mobile-typecheck, security-scan]
    steps:
      - run: echo "All checks passed — ready to merge"
